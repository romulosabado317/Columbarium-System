[package]
name = "romulosabado317/columbarium-system"
version = "0.1.0"
description = "Maria Della Strada Columbarium Management System"

[[module]]
name = "php"
source = "php/php:8.1"

[[module]]
name = "app"
source = "."

[commands]
run = { module = "php", launcher = "php-runtime", args = ["-t", "."] }

[[proxies]]
command = "run"
path = "/"
